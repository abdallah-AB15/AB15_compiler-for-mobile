<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>AB15 Compiler</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 42 42'%3E%3Cpolygon points='21,2 38,11 38,31 21,40 4,31 4,11' fill='none' stroke='%2339ff14' stroke-width='2'/%3E%3Ctext x='6' y='24' font-family='Arial' font-weight='900' font-size='14' fill='%2339ff14'%3EAB%3C/text%3E%3Ctext x='22' y='30' font-family='Arial' font-weight='900' font-size='10' fill='%2339ff14'%3E15%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<style>
/* ═══ VARIABLES ═══ */
:root {
  --mono: 'JetBrains Mono', monospace;
  --disp: 'Syne', sans-serif;
  --bg:   #080808;
  --s1:   #111111;
  --s2:   #181818;
  --bdr:  #252525;
  --acc:  #39ff14;
  --a2:   #00e5ff;
  --txt:  #e8e8e8;
  --dim:  #555;
  --err:  #ff5055;
  --warn: #ffb347;
  --kw:   #39ff14;
  --str:  #7ee8a2;
  --num:  #ffa657;
  --cmt:  #444;
  --bi:   #c792ea;
  --df:   #82aaff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--mono);
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}

/* ═══ HEADER ═══ */
.hdr {
  flex-shrink: 0;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  background: var(--s1);
  border-bottom: 1px solid var(--bdr);
  position: relative;
  z-index: 50;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-hex {
  width: 32px; height: 32px;
  filter: drop-shadow(0 0 8px color-mix(in srgb, var(--acc) 60%, transparent));
}
.logo-name {
  font-family: var(--disp);
  font-weight: 900;
  font-size: 16px;
  color: var(--acc);
  text-shadow: 0 0 14px color-mix(in srgb, var(--acc) 50%, transparent);
  letter-spacing: -0.3px;
}

/* Lang toggle */
.lang-toggle {
  display: flex;
  gap: 4px;
  background: var(--s2);
  padding: 3px;
  border: 1px solid var(--bdr);
  border-radius: 6px;
}
.ltb {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  border-radius: 4px;
  transition: all .2s;
  white-space: nowrap;
}
.ltb.on {
  background: var(--acc);
  color: #000;
  box-shadow: 0 0 10px color-mix(in srgb, var(--acc) 40%, transparent);
}
.ltb svg { width: 14px; height: 14px; flex-shrink: 0; }

.spacer { flex: 1; }

/* Theme btn */
.theme-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--bdr);
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all .2s;
  flex-shrink: 0;
}
.theme-btn:active { border-color: var(--acc); color: var(--acc); }

/* Status dot */
.sdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: all .3s;
}
.sdot.ready { background: var(--acc); box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 65%, transparent); }
.sdot.spin  { background: var(--acc); animation: bl 1s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ═══ TOOLBAR ═══ */
.toolbar {
  flex-shrink: 0;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  background: var(--s2);
  border-bottom: 1px solid var(--bdr);
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.toolbar::-webkit-scrollbar { display: none; }

.ftab {
  font-size: 11px;
  color: var(--acc);
  border-bottom: 2px solid var(--acc);
  padding-bottom: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn {
  flex-shrink: 0;
  padding: 7px 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all .15s;
  white-space: nowrap;
  border-radius: 3px;
}
.btn-run {
  background: var(--acc);
  color: #000;
  box-shadow: 0 0 12px color-mix(in srgb, var(--acc) 35%, transparent);
  padding: 8px 18px;
  font-size: 12px;
}
.btn-run:active { filter: brightness(1.2); transform: scale(.97); }
.btn-run:disabled { opacity: .4; }
.btn-sm {
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--bdr);
  padding: 6px 10px;
  font-size: 13px;
}
.btn-sm:active { color: var(--acc); border-color: var(--acc); }
.btn-clr { background: transparent; color: var(--dim); border: 1px solid var(--bdr); }
.btn-clr:active { color: var(--txt); }

.si { font-size: 10px; color: var(--dim); display: flex; align-items: center; gap: 4px; transition: color .3s; flex-shrink: 0; }
.si.ok { color: var(--acc); }
.si-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ═══ MAIN AREA ═══ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* PANEL LABEL */
.plbl {
  flex-shrink: 0;
  padding: 6px 14px;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dim);
  background: var(--s1);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.plbl-left { display: flex; align-items: center; gap: 7px; }
.plbl-left::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--acc);
  clip-path: polygon(50% 0%,100% 50%,50% 100%,0 50%);
  flex-shrink: 0;
  transition: background .2s;
}

/* EDITOR PANE */
.editor-pane {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: height .3s ease;
}
.editor-wrap { flex: 1; overflow: hidden; min-height: 0; }

/* DRAG HANDLE */
.drag-handle {
  flex-shrink: 0;
  height: 20px;
  background: var(--s2);
  border-top: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: ns-resize;
  touch-action: none;
  transition: background .2s;
}
.drag-handle:active, .drag-handle.dr { background: color-mix(in srgb, var(--acc) 12%, var(--s2)); }
.drag-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}
.drag-dot {
  width: 28px; height: 2px;
  background: var(--bdr);
  border-radius: 1px;
  transition: background .2s;
}
.drag-handle:active .drag-dot, .drag-handle.dr .drag-dot { background: var(--acc); }

/* TERMINAL PANE */
.term-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 80px;
}
.term-body {
  flex: 1;
  padding: 12px 14px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.8;
  -webkit-overflow-scrolling: touch;
}
.term-body::-webkit-scrollbar { display: none; }

/* OUTPUT LINES */
.ol { display: block; animation: fi .1s ease; word-break: break-word; }
@keyframes fi { from{opacity:0;transform:translateX(-3px)}to{opacity:1;transform:translateX(0)} }
.ol.n  { color: var(--txt); }
.ol.e  { color: var(--err); }
.ol.w  { color: var(--warn); }
.ol.s  { color: var(--dim); font-size: 10px; letter-spacing: .8px; }
.ol.ec { color: var(--acc); }
.op    { color: var(--acc); margin-right: 8px; user-select: none; font-weight: 700; }
.op-e  { color: var(--err); margin-right: 8px; user-select: none; }

/* INLINE INPUT */
.ir {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0;
  flex-wrap: wrap;
}
.ipt { color: var(--dim); font-size: 13px; flex-shrink: 0; word-break: break-word; }
.is  { color: var(--acc); font-weight: 700; flex-shrink: 0; }
.ifield {
  flex: 1;
  min-width: 100px;
  background: var(--s2);
  border: 1px solid var(--acc);
  color: var(--acc);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  padding: 6px 10px;
  caret-color: var(--acc);
  border-radius: 4px;
}
.ifield::placeholder { color: color-mix(in srgb, var(--acc) 30%, transparent); font-size: 12px; }
.ien {
  padding: 6px 14px;
  background: var(--acc);
  color: #000;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  flex-shrink: 0;
}

/* STATUS BAR */
.sbar {
  flex-shrink: 0;
  padding: 5px 14px;
  border-top: 1px solid var(--bdr);
  background: var(--s1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--dim);
}
.tbdg {
  padding: 2px 8px;
  border: 1px solid var(--bdr);
  font-size: 9px;
  color: var(--a2);
  letter-spacing: 1px;
}

/* ═══ CODEMIRROR MOBILE ═══ */
.CodeMirror {
  height: 100% !important;
  background: var(--bg) !important;
  color: var(--txt) !important;
  font-family: var(--mono) !important;
  font-size: 14px !important;
  line-height: 1.7 !important;
}
.CodeMirror-gutters  { background: var(--s1) !important; border-right: 1px solid var(--bdr) !important; min-width: 44px; }
.CodeMirror-linenumber { color: var(--dim) !important; font-size: 11px !important; padding: 0 6px !important; }
.CodeMirror-cursor   { border-left: 2px solid var(--acc) !important; }
.CodeMirror-selected { background: color-mix(in srgb, var(--acc) 10%, transparent) !important; }
.CodeMirror-activeline-background { background: color-mix(in srgb, var(--txt) 3%, transparent) !important; }
.cm-keyword  { color: var(--kw)  !important; font-weight: 700; }
.cm-def      { color: var(--df)  !important; }
.cm-string, .cm-string-2 { color: var(--str) !important; }
.cm-number   { color: var(--num) !important; }
.cm-comment  { color: var(--cmt) !important; font-style: italic; }
.cm-builtin  { color: var(--bi)  !important; }
.cm-operator { color: var(--dim) !important; }

/* ═══ THEME DRAWER ═══ */
.theme-drawer {
  position: fixed;
  bottom: -200px;
  left: 0; right: 0;
  background: var(--s1);
  border-top: 2px solid var(--acc);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  padding: 16px 20px 24px;
  z-index: 200;
  transition: bottom .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 -10px 40px rgba(57,255,20,.08);
}
.theme-drawer.open { bottom: 0; }
.drawer-title {
  font-family: var(--disp);
  font-size: 13px;
  color: var(--acc);
  letter-spacing: 1px;
  margin-bottom: 14px;
  text-align: center;
}
.theme-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.thm {
  padding: 10px 4px;
  background: var(--s2);
  border: 1px solid var(--bdr);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  border-radius: 6px;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.thm:active, .thm.on { border-color: var(--acc); color: var(--acc); }
.thm-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Drawer backdrop */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 190;
  display: none;
  backdrop-filter: blur(2px);
}
.backdrop.show { display: block; }

/* ═══ LOADER ═══ */
.ldr {
  position: fixed; inset: 0;
  background: #080808;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity .5s;
}
.ldr.gone { opacity: 0; pointer-events: none; }
.ldr-logo {
  font-family: 'Syne', sans-serif;
  font-size: 56px;
  font-weight: 900;
  color: #39ff14;
  letter-spacing: -3px;
  animation: glow 2s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { text-shadow: 0 0 24px #39ff1460, 0 0 50px #39ff1428; }
  50%      { text-shadow: 0 0 40px #39ff1490, 0 0 80px #39ff1455; }
}
.ldr-sub { font-size: 10px; color: #333; letter-spacing: 3.5px; text-transform: uppercase; }
.ldr-tr  { width: 180px; height: 2px; background: #1a1a1a; overflow: hidden; }
.ldr-br  { height: 100%; background: #39ff14; width: 0%; transition: width .4s; box-shadow: 0 0 8px #39ff1480; }
.ldr-lb  { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }

/* ═══ QUICK SNIPPET KEYS ═══ */
.snippets {
  flex-shrink: 0;
  height: 38px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  background: var(--s2);
  border-bottom: 1px solid var(--bdr);
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.snippets::-webkit-scrollbar { display: none; }
.snip {
  flex-shrink: 0;
  padding: 4px 10px;
  background: var(--s1);
  border: 1px solid var(--bdr);
  color: var(--acc);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  border-radius: 3px;
  transition: all .15s;
  white-space: nowrap;
}
.snip:active { background: color-mix(in srgb, var(--acc) 15%, transparent); border-color: var(--acc); }

/* ═══ RESPONSIVE: LANDSCAPE ═══ */
@media (orientation: landscape) and (max-height: 500px) {
  .hdr { height: 44px; }
  .toolbar { height: 40px; }
  .snippets { height: 34px; }
  .drag-handle { height: 16px; }
  .CodeMirror { font-size: 13px !important; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="ldr" id="ldr">
  <div class="ldr-logo">AB15</div>
  <div class="ldr-sub">Mobile Compiler</div>
  <div class="ldr-tr"><div class="ldr-br" id="lbar"></div></div>
  <div class="ldr-lb" id="llbl">Loading Python...</div>
</div>

<!-- THEME BACKDROP -->
<div class="backdrop" id="backdrop" onclick="closeThemes()"></div>

<!-- THEME DRAWER -->
<div class="theme-drawer" id="drawer">
  <div class="drawer-title">— THEMES —</div>
  <div class="theme-grid">
    <button class="thm on" data-t="dark" onclick="setTheme('dark',this)">
      <div class="thm-dot" style="background:#39ff14"></div>Dark
    </button>
    <button class="thm" data-t="light" onclick="setTheme('light',this)">
      <div class="thm-dot" style="background:#1a8a00"></div>Light
    </button>
    <button class="thm" data-t="midnight" onclick="setTheme('midnight',this)">
      <div class="thm-dot" style="background:#3dff70"></div>Night
    </button>
    <button class="thm" data-t="forest" onclick="setTheme('forest',this)">
      <div class="thm-dot" style="background:#56ff2a"></div>Forest
    </button>
    <button class="thm" data-t="dracula" onclick="setTheme('dracula',this)">
      <div class="thm-dot" style="background:#50fa7b"></div>Dracula
    </button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <!-- Logo -->
  <div class="logo">
    <svg class="logo-hex" viewBox="0 0 42 42" fill="none">
      <polygon points="21,2 38,11 38,31 21,40 4,31 4,11" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
      <line x1="4" y1="11" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <line x1="38" y1="11" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <line x1="21" y1="40" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <text x="6.5" y="23" font-family="Syne,sans-serif" font-weight="900" font-size="12.5" fill="var(--acc)">AB</text>
      <text x="22" y="29" font-family="Syne,sans-serif" font-weight="900" font-size="9.5" fill="var(--acc)" opacity="0.85">15</text>
      <circle cx="21" cy="21" r="1.8" fill="var(--acc)"/>
    </svg>
    <div class="logo-name">AB15</div>
  </div>

  <!-- Language toggle -->
  <div class="lang-toggle">
    <button class="ltb on" id="tab-py" onclick="switchLang('python',this)">
      <!-- Python mini logo -->
      <svg viewBox="0 0 110 110" fill="none">
        <defs>
          <linearGradient id="pb" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#387EB8"/>
            <stop offset="100%" style="stop-color:#366994"/>
          </linearGradient>
          <linearGradient id="py" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFE052"/>
            <stop offset="100%" style="stop-color:#FFC331"/>
          </linearGradient>
        </defs>
        <path d="M54.9,8.1c-26.3,0-24.6,11.4-24.6,11.4l0,11.8h25.1v3.5H21.3c0,0-16.8-1.9-16.8,24.7s14.7,24.9,14.7,24.9h8.8V72.7c0,0-0.5-14.7,14.4-14.7h24.9c0,0,13.9,0.2,13.9-13.5V22.2C81.3,22.2,83.6,8.1,54.9,8.1z M40.5,15.8c2.5,0,4.5,2,4.5,4.5s-2,4.5-4.5,4.5s-4.5-2-4.5-4.5S38,15.8,40.5,15.8z" fill="url(#pb)"/>
        <path d="M55.4,101.5c26.3,0,24.6-11.4,24.6-11.4l0-11.8H54.9v-3.5H89c0,0,16.8,1.9,16.8-24.7S91.1,25.2,91.1,25.2H82.3V36.9c0,0,0.5,14.7-14.4,14.7H43c0,0-13.9-0.2-13.9,13.5v25.3C29.1,90.4,26.8,101.5,55.4,101.5z M69.8,93.8c-2.5,0-4.5-2-4.5-4.5s2-4.5,4.5-4.5s4.5,2,4.5,4.5S72.3,93.8,69.8,93.8z" fill="url(#py)"/>
      </svg>
      Python
    </button>
    <button class="ltb" id="tab-js" onclick="switchLang('javascript',this)">
      <!-- JS mini logo -->
      <svg viewBox="0 0 630 630">
        <rect width="630" height="630" fill="#f7df1e" rx="30"/>

<script>
// ════════════════════════════════════
// THEME SYSTEM
// ════════════════════════════════════
const THEMES = {
  dark:     {bg:'#080808',s1:'#111111',s2:'#181818',bdr:'#252525',acc:'#39ff14',a2:'#00e5ff',txt:'#e8e8e8',dim:'#555',err:'#ff5055',warn:'#ffb347',kw:'#39ff14',str:'#7ee8a2',num:'#ffa657',cmt:'#444',bi:'#c792ea',df:'#82aaff'},
  light:    {bg:'#fafafa',s1:'#f0f0f0',s2:'#e8e8e8',bdr:'#d0d0d0',acc:'#1a8a00',a2:'#0057cc',txt:'#1a1a1a',dim:'#888',err:'#cc2200',warn:'#cc7700',kw:'#1a8a00',str:'#0a6620',num:'#aa5500',cmt:'#bbb',bi:'#7700aa',df:'#0057cc'},
  midnight: {bg:'#0d1117',s1:'#161b22',s2:'#1c2128',bdr:'#30363d',acc:'#3dff70',a2:'#79c0ff',txt:'#e6edf3',dim:'#6e7681',err:'#ff7b72',warn:'#ffa657',kw:'#ff7b72',str:'#a5d6ff',num:'#ffa657',cmt:'#4d5566',bi:'#d2a8ff',df:'#79c0ff'},
  forest:   {bg:'#0c1a0c',s1:'#122012',s2:'#172917',bdr:'#253525',acc:'#56ff2a',a2:'#00ffcc',txt:'#d0ead0',dim:'#507050',err:'#ff6666',warn:'#ffcc66',kw:'#56ff2a',str:'#88dd88',num:'#ffcc44',cmt:'#3a5a3a',bi:'#bb88ff',df:'#00ffcc'},
  dracula:  {bg:'#282a36',s1:'#21222c',s2:'#2a2c3a',bdr:'#44475a',acc:'#50fa7b',a2:'#8be9fd',txt:'#f8f8f2',dim:'#6272a4',err:'#ff5555',warn:'#ffb86c',kw:'#ff79c6',str:'#f1fa8c',num:'#bd93f9',cmt:'#6272a4',bi:'#8be9fd',df:'#50fa7b'},
};

function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg); r.setProperty('--s1', t.s1); r.setProperty('--s2', t.s2);
  r.setProperty('--bdr', t.bdr); r.setProperty('--acc', t.acc); r.setProperty('--a2', t.a2);
  r.setProperty('--txt', t.txt); r.setProperty('--dim', t.dim); r.setProperty('--err', t.err);
  r.setProperty('--warn', t.warn); r.setProperty('--kw', t.kw); r.setProperty('--str', t.str);
  r.setProperty('--num', t.num); r.setProperty('--cmt', t.cmt); r.setProperty('--bi', t.bi);
  r.setProperty('--df', t.df);
  if (editor) editor.refresh();
}

function setTheme(name, btn) {
  applyTheme(name);
  document.querySelectorAll('.thm').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  localStorage.setItem('ab15_theme', name);
  closeThemes();
}

function openThemes() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}

function closeThemes() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

// ════════════════════════════════════
// SNIPPETS
// ════════════════════════════════════
const SNIPS = {
  python: [
    { label: 'print()', code: 'print()' },
    { label: 'input()', code: 'input("")' },
    { label: 'for', code: 'for i in range(10):\n    ' },
    { label: 'if', code: 'if :\n    ' },
    { label: 'def', code: 'def name():\n    ' },
    { label: 'list', code: '[]' },
    { label: 'dict', code: '{}' },
    { label: 'f""', code: 'f""' },
    { label: '==', code: ' == ' },
    { label: '!=', code: ' != ' },
    { label: ':', code: ':' },
    { label: '()', code: '()' },
  ],
  javascript: [
    { label: 'console.log', code: 'console.log()' },
    { label: 'for', code: 'for(let i=0;i<10;i++) {\n    \n}' },
    { label: 'if', code: 'if() {\n    \n}' },
    { label: 'function', code: 'function name() {\n    \n}' },
    { label: 'const', code: 'const ' },
    { label: 'let', code: 'let ' },
    { label: '=>', code: ' => ' },
    { label: '[]', code: '[]' },
    { label: '{}', code: '{}' },
    { label: '===', code: ' === ' },
    { label: '`${}`', code: '`${}`' },
  ],
};

function renderSnippets(lang) {
  const bar = document.getElementById('snippets');
  bar.innerHTML = '';
  (SNIPS[lang] || []).forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'snip';
    btn.textContent = s.label;
    btn.onclick = () => {
      const cursor = editor.getCursor();
      editor.replaceRange(s.code, cursor);
      editor.focus();
    };
    bar.appendChild(btn);
  });
}

// ════════════════════════════════════
// STARTERS
// ════════════════════════════════════
const STARTERS = {
  python: `# AB15 Mobile Compiler 🚀
# Python 3 — runs 100% in-browser

name = input("Your name? ")
print(f"Hello, {name}! 👋")

for day in range(1, 6):
    print(f"  Day {day} of 30 ✅")

print("Keep going! 💪🔥")`,

  javascript: `// AB15 Mobile Compiler 🚀
// JavaScript — runs in-browser

function input(prompt) {
    return window.prompt(prompt) || "";
}

const name = input("Your name? ");
console.log(\`Hello, \${name}! 👋\`);

for (let i = 1; i <= 5; i++) {
    console.log(\`  Day \${i} of 30 ✅\`);
}

console.log("Keep going! 💪🔥");`,
};

let lang = 'python';
let pyodide = null;
let editor = null;
let inputResolve = null;
let saveTO = null;

// ════════════════════════════════════
// VERTICAL RESIZER (touch)
// ════════════════════════════════════
(function () {
  const handle = document.getElementById('dragHandle');
  const edPane = document.getElementById('editorPane');
  const main   = document.getElementById('main');
  let drag = false, startY = 0, startH = 0;

  function getH() { return edPane.offsetHeight; }
  function setH(h) {
    const maxH = main.offsetHeight - 120;
    const clamped = Math.min(Math.max(h, 80), maxH);
    edPane.style.height = clamped + 'px';
    if (editor) editor.refresh();
  }

  handle.addEventListener('touchstart', e => {
    drag = true; startY = e.touches[0].clientY; startH = getH();
    handle.classList.add('dr');
  }, { passive: true });

  handle.addEventListener('mousedown', e => {
    drag = true; startY = e.clientY; startH = getH();
    handle.classList.add('dr');
    document.body.style.cssText = 'cursor:ns-resize;user-select:none';
  });

  document.addEventListener('touchmove', e => {
    if (!drag) return;
    setH(startH + (e.touches[0].clientY - startY));
  }, { passive: true });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    setH(startH + (e.clientY - startY));
  });

  const stop = () => {
    if (!drag) return;
    drag = false; handle.classList.remove('dr');
    document.body.style.cssText = '';
  };
  document.addEventListener('touchend', stop);
  document.addEventListener('mouseup', stop);

  // Init height: 50%
  setTimeout(() => {
    setH(main.offsetHeight * 0.48);
  }, 200);
})();

// ════════════════════════════════════
// LANG SWITCH
// ════════════════════════════════════
function switchLang(newLang, btn) {
  localStorage.setItem('ab15_code_' + lang, editor.getValue());
  lang = newLang;
  document.querySelectorAll('.ltb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const files = { python: 'main.py', javascript: 'main.js' };
  const modes = { python: 'python', javascript: 'javascript' };
  const info  = { python: 'Python 3 · In-Browser', javascript: 'JavaScript · In-Browser' };
  document.getElementById('ftab').textContent = files[lang];
  document.getElementById('langInfo').textContent = info[lang];
  editor.setOption('mode', modes[lang]);
  const saved = localStorage.getItem('ab15_code_' + lang);
  editor.setValue(saved || STARTERS[lang]);
  editor.refresh();
  renderSnippets(lang);
  clearOut(false);
  appendLine('// ' + (lang === 'python' ? '🐍 Python 3 ready ✅' : '🌐 JavaScript ready ✅'), 's');
}

// ════════════════════════════════════
// AUTO SAVE
// ════════════════════════════════════
function autoSave() {
  const el = document.getElementById('si');
  el.classList.remove('ok');
  clearTimeout(saveTO);
  saveTO = setTimeout(() => {
    localStorage.setItem('ab15_code_' + lang, editor.getValue());
    el.classList.add('ok');
    setTimeout(() => el.classList.remove('ok'), 2000);
  }, 1000);
}

// ════════════════════════════════════
// DOWNLOAD
// ════════════════════════════════════
function dlCode() {
  const files = { python: 'main.py', javascript: 'main.js' };
  const blob = new Blob([editor.getValue()], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = files[lang]; a.click();
}

// ════════════════════════════════════
// CODEMIRROR
// ════════════════════════════════════
editor = CodeMirror.fromTextArea(document.getElementById('cm'), {
  mode: 'python',
  lineNumbers: true,
  autoCloseBrackets: true,
  indentUnit: 4,
  tabSize: 4,
  indentWithTabs: false,
  styleActiveLine: true,
  extraKeys: { 'Tab': cm => cm.replaceSelection('    ') }
});
editor.on('change', autoSave);
editor.on('cursorActivity', () => {
  const c = editor.getCursor();
  document.getElementById('lineInfo').textContent = `Ln ${c.line + 1}`;
});
setTimeout(() => { editor.setSize('100%', '100%'); editor.refresh(); }, 150);

// ════════════════════════════════════
// OUTPUT
// ════════════════════════════════════
function appendLine(text, cls) {
  const out = document.getElementById('out');
  const ir  = document.getElementById('_ir');
  if (text === undefined || text === null) return;
  String(text).split('\n').forEach((line, i, arr) => {
    if (i === arr.length - 1 && line === '') return;
    const el = document.createElement('span');
    el.className = 'ol ' + cls;
    if (cls === 'n')      el.innerHTML = '<span class="op">›</span>' + esc(line);
    else if (cls === 'e') el.innerHTML = '<span class="op-e">✕</span>' + esc(line);
    else                  el.textContent = line;
    if (ir) out.insertBefore(el, ir); else out.appendChild(el);
  });
  out.scrollTop = out.scrollHeight;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearOut(hint = true) {
  document.getElementById('_ir')?.remove();
  if (inputResolve) { inputResolve(''); inputResolve = null; }
  document.getElementById('out').innerHTML = '';
  if (hint) appendLine('// Press Run to execute your code', 's');
  document.getElementById('emsg').textContent = 'Ready';
  document.getElementById('tbdg').textContent = '—';
}

// ════════════════════════════════════
// PYTHON INPUT (inline terminal)
// ════════════════════════════════════
function askInput(prompt) {
  return new Promise(resolve => {
    inputResolve = resolve;
    const out = document.getElementById('out');
    document.getElementById('_ir')?.remove();
    const row = document.createElement('div');
    row.className = 'ir'; row.id = '_ir';
    if (prompt) {
      const pt = document.createElement('span'); pt.className = 'ipt'; pt.textContent = prompt; row.appendChild(pt);
    }
    const sym = document.createElement('span'); sym.className = 'is'; sym.textContent = '›'; row.appendChild(sym);
    const field = document.createElement('input');
    field.className = 'ifield'; field.type = 'text';
    field.autocomplete = 'off'; field.spellcheck = false;
    field.placeholder = 'Type and press Enter...';
    row.appendChild(field);
    const btn = document.createElement('button'); btn.className = 'ien'; btn.textContent = '↵'; row.appendChild(btn);
    const submit = () => {
      const val = field.value; row.remove();
      const echo = document.createElement('span'); echo.className = 'ol ec';
      echo.innerHTML = '<span class="op">↳</span>' + esc(prompt || '') + ' <strong>' + esc(val) + '</strong>';
      out.appendChild(echo); out.scrollTop = out.scrollHeight;
      if (inputResolve) { inputResolve(val); inputResolve = null; }
    };
    btn.onclick = submit;
    field.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    out.appendChild(row); out.scrollTop = out.scrollHeight;
    setTimeout(() => field.focus(), 50);
  });
}

// ════════════════════════════════════
// PYODIDE
// ════════════════════════════════════
window._pyOut = t => appendLine(t, 'n');
window._pyErr = t => { t.split('\n').forEach(l => { if (l.trim()) appendLine(l, 'e'); }); };

async function initPyodide() {
  const bar = document.getElementById('lbar'), lbl = document.getElementById('llbl');
  bar.style.width = '20%'; lbl.textContent = 'Downloading Python 3.11...';
  pyodide = await loadPyodide();
  bar.style.width = '60%'; lbl.textContent = 'Configuring...';
  pyodide.runPython(`
import sys
class _Cap:
    def __init__(self,cb): self.cb=cb
    def write(self,s):
        if s:
            from js import window
            getattr(window,self.cb)(s)
    def flush(self): pass
sys.stdout=_Cap('_pyOut')
sys.stderr=_Cap('_pyErr')
  `);
  pyodide.globals.set('_js_input', pyodide.toPy(askInput));
  bar.style.width = '100%'; lbl.textContent = 'Ready!';
  await new Promise(r => setTimeout(r, 300));
  document.getElementById('ldr').classList.add('gone');
  document.getElementById('sdot').className = 'sdot ready';

  // Restore theme
  const t = localStorage.getItem('ab15_theme');
  if (t) {
    applyTheme(t);
    document.querySelectorAll('.thm').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  }

  // Restore code
  const c = localStorage.getItem('ab15_code_python');
  if (c) editor.setValue(c);
  renderSnippets('python');
}

// ════════════════════════════════════
// PYTHON WRAPPER
// ════════════════════════════════════
function wrapPython(code) {
  const ind = code.replace(/(?<!await\s)input\s*\(/g, 'await input(').split('\n').map(l => '    ' + l).join('\n');
  return `import asyncio as _aio
async def _run():
    import builtins
    async def _input(prompt=''):
        import sys
        if prompt:
            sys.stdout.write(str(prompt))
            sys.stdout.flush()
        return await _js_input(str(prompt) if prompt else '')
    builtins.input=_input
${ind}
_aio.get_event_loop().run_until_complete(_run())`;
}

// ════════════════════════════════════
// JS RUNNER
// ════════════════════════════════════
function runJS(code) {
  const ol = console.log, oe = console.error, ow = console.warn;
  const op = window.prompt;
  console.log   = (...a) => appendLine(a.map(x => typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' '),'n');
  console.error = (...a) => appendLine(a.map(String).join(' '),'e');
  console.warn  = (...a) => appendLine(a.map(String).join(' '),'w');
  window.prompt = (msg) => { const v=op?op.call(window,msg||''):''; if(v&&msg)appendLine(`  ${msg} ${v}`,'ec'); return v||''; };
  try { new Function(code)(); }
  catch(err) { appendLine(err.toString(),'e'); }
  finally { console.log=ol;console.error=oe;console.warn=ow;window.prompt=op; }
}

// ════════════════════════════════════
// MAIN RUN
// ════════════════════════════════════
async function runCode() {
  const btn = document.getElementById('runBtn');
  btn.textContent = '●'; btn.disabled = true;
  clearOut(false);
  appendLine(`── Run  ${new Date().toLocaleTimeString()} ─────────────────`, 's');
  const code = editor.getValue().trim();
  if (!code) { appendLine('Write some code first!','w'); btn.textContent='▶ Run'; btn.disabled=false; return; }
  const t0 = performance.now();
  try {
    if (lang === 'python') {
      if (!pyodide) { appendLine('Engine loading...','w'); btn.textContent='▶ Run'; btn.disabled=false; return; }
      await pyodide.runPythonAsync(wrapPython(code));
    } else {
      runJS(code);
    }
  } catch(err) {
    appendLine((err.message||String(err)).split('\n').filter(l=>l.trim()).slice(-4).join('\n'),'e');
  }
  document.getElementById('_ir')?.remove();
  const ms = Math.round(performance.now()-t0);
  appendLine(`── Done  ${ms}ms ───────────────────────────`, 's');
  document.getElementById('tbdg').textContent = ms+'ms';
  document.getElementById('emsg').textContent = 'Done';
  btn.textContent = '▶ Run'; btn.disabled = false;
}

initPyodide();
</script>
